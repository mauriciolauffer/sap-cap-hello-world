_schema-version: 3.3.0
ID: sap-cap-hello-world
version: 1.0.0
description: "SAP CAP Hello World"
parameters:
  enable-parallel-deployments: true
  deploy_mode: html5-repo
build-parameters:
  before-all:
    - builder: custom
      commands:
        - npx cds build --production
modules:
  - name: sap-cap-hello-world-srv
    type: nodejs
    path: gen/srv
    parameters:
      instances: 1
      buildpack: nodejs_buildpack
    build-parameters:
      builder: custom
      commands: []
    provides:
      - name: srv-api # required by consumers of CAP services (e.g. approuter)
        properties:
          srv-url: ${default-url}
    requires:
      - name: sap-cap-hello-world-destination
      - name: sap-cap-hello-world-db
      - name: sap-cap-hello-world-auth
    properties:
      OPTIMIZE_MEMORY: true

  - name: sap-cap-hello-world-db-deployer
    type: hdb
    path: gen/db
    parameters:
      buildpack: nodejs_buildpack
    build-parameters:
      builder: custom
      commands: []
    requires:
      - name: sap-cap-hello-world-db
    properties:
      OPTIMIZE_MEMORY: true

  - name: sap-cap-hello-world-app-deployer
    type: com.sap.application.content
    path: gen
    requires:
      - name: sap-cap-hello-world-html5-repo-host
        parameters:
          content-target: true
    build-parameters:
      build-result: app/
      requires:
        - name: sapcaphelloworldadminbooks
          artifacts:
            - admin-books.zip
          target-path: app/
        - name: sapcaphelloworldbrowse
          artifacts:
            - browse.zip
          target-path: app/

  - name: sapcaphelloworldadminbooks
    type: html5
    path: app/admin-books
    build-parameters:
      build-result: dist
      builder: custom
      commands:
        - npm i
        - npm run build
      supported-platforms: []
  - name: sapcaphelloworldbrowse
    type: html5
    path: app/browse
    build-parameters:
      build-result: dist
      builder: custom
      commands:
        - npm i
        - npm run build
      supported-platforms: []

  - name: sap-cap-hello-world-destinations
    type: com.sap.application.content
    requires:
      - name: sap-cap-hello-world-auth
        parameters:
          service-key:
            name: sap-cap-hello-world-auth-key
      - name: sap-cap-hello-world-html5-repo-host
        parameters:
          service-key:
            name: sap-cap-hello-world-html5-repo-host-key
      - name: srv-api
      - name: sap-cap-hello-world-destination
        parameters:
          content-target: true
    build-parameters:
      no-source: true
    parameters:
      content:
        instance:
          existing_destinations_policy: update
          destinations:
            - Name: sap-cap-hello-world-html5-repository
              ServiceInstanceName: sap-cap-hello-world-html5-repo-host
              ServiceKeyName: sap-cap-hello-world-html5-repo-host-key
              sap.cloud.service: sapcaphelloworld.service
            - Name: sap-cap-hello-world-auth
              Authentication: OAuth2UserTokenExchange
              ServiceInstanceName: sap-cap-hello-world-auth
              ServiceKeyName: sap-cap-hello-world-auth-key
              sap.cloud.service: sapcaphelloworld.service

resources:
  - name: sap-cap-hello-world-destination
    type: org.cloudfoundry.managed-service
    parameters:
      service: destination
      service-plan: lite
      config:
        HTML5Runtime_enabled: true
        init_data:
          instance:
            existing_destinations_policy: update
            destinations:
              - Name: srv-api
                URL: ~{srv-api/srv-url}
                Authentication: NoAuthentication
                Type: HTTP
                ProxyType: Internet
                HTML5.ForwardAuthToken: true
                HTML5.DynamicDestination: true
    requires:
      - name: srv-api
        group: destinations
        properties:
          name: srv-api # must be used in xs-app.json as well
          url: ~{srv-url}
          forwardAuthToken: true
  - name: sap-cap-hello-world-db
    type: com.sap.xs.hdi-container
    parameters:
      service: hana
      service-plan: hdi-shared

  - name: sap-cap-hello-world-html5-repo-host
    type: org.cloudfoundry.managed-service
    parameters:
      service: html5-apps-repo
      service-plan: app-host
  - name: sap-cap-hello-world-html5-runtime
    type: org.cloudfoundry.managed-service
    parameters:
      service: html5-apps-repo
      service-plan: app-runtime
  - name: sap-cap-hello-world-auth
    type: org.cloudfoundry.managed-service
    parameters:
      service: xsuaa
      service-plan: application
      path: ./xs-security.json
      config:
        xsappname: sap-cap-hello-world-auth
        tenant-mode: dedicated
